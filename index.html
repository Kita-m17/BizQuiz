<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <meta name="theme-color" content="#0A1A0F">
        <title>BizQuiz — M-Pesa</title>

        <style>
            /* Reset CSS - default styles */
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            /* CSS Variables - Colour and Custom Properties */
            :root {
                /* Background layers - darkest to lightest */
                --bg-body: #0A1A0F; /* deepest dark green-black */
                --bg-card: #0F2518; /* slightly lighter - for cards/panels */
                --bg-card-hover: #143020; /* hover state on interactive elements */
                --bg-input: #1A3528; /* input fields, option buttons */
 
                /* M-Pesa brand green - the star of the show */
                --accent: #00C853; /* primary green */
                --accent-dim: #00A844; /* slightly darker green for borders */
                --accent-glow: rgba(0, 200, 83, 0.15); /* subtle green glow effect */
 
                /* Text colors - brightest to dimmest */
                --text-primary: #FFFFFF;
                --text-secondary: #A8C5B0; /* muted green-tinted gray */
                --text-dim: #5A7A62; /* very subtle, for hints */
 
                /* Score feedback */
                --gain: #00E676; /* bright green for correct/gains */
                --loss: #FF5252; /* red for wrong/losses */
 
                /* Borders */
                --border: rgba(0, 200, 83, 0.2); /* subtle green border */
                --border-strong: rgba(0, 200, 83, 0.4); /* more visible border */
 
                /* Sizing */
                --radius: 12px; /* standard corner rounding */
                --radius-sm: 8px; /* smaller corners for buttons */
            }

            /* Body Styles */
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: var(--bg-body);
                color: var(--text-primary);
                min-height: 100dvh;
                overflow-x: hidden;
            }

            /* Game Container */
            #game-container {
                max-width: 430px;
                margin: 0 auto;
                min-height: 100dvh;
                position: relative;
                overflow: hidden;
            }

            /* Screen Management */
            .screen {
                display: none; /* hidden by default */
                flex-direction: column;
                min-height: 100dvh;
                padding: 0 16px;
            }
        
            .screen.active {
                display: flex; /* shown when .active class is added */
            }

            /* Splash Layout */
            #splash-screen {
                justify-content: center;
                align-items: center;
                text-align: center;
                padding: 2rem 1.5rem;
                position: relative;
            }

            /* Backgrund Decoration */
            #splash-screen::before {
                content: ''; /* required — even if empty */
                position: absolute; /* takes it out of normal flow */
                top: 0; left: 0; right: 0; bottom: 0; /* covers full screen */
                background: radial-gradient(ellipse at 50% 30%, rgba(0, 200, 83, 0.08) 0%, transparent 60%);
                pointer-events: none; /* clicks pass through */
                z-index: 0; /* sits behind content */

                /* Candelstick Background*/
                background:
                    repeating-linear-gradient(90deg, transparent, transparent 28px,rgba(0, 200, 83, 0.04) 28px,rgba(0, 200, 83, 0.04) 29px);
            }
            #splash-screen::after {
                content: '';
                position: absolute;
                /*RADIAL GLOW*/
                top: 15%;
                left: 50%;
                transform: translateX(-50%);
                width: 350px;
                height: 350px;
                border-radius: 50%;
                background: radial-gradient(circle, rgba(0, 200, 83, 0.1) 0%, transparent 70%);
                border-top: 1px solid rgba(0, 200, 83, 0.15);
                pointer-events: none;
                z-index: 0;
            }

            /* LOGO */
            .splash-brand {
                font-size: 14px;
                font-weight: 500;
                letter-spacing: 2px;
                color: var(--text-secondary);
                margin-bottom: 1rem;
                position: relative;
                z-index: 1;
            }
            
            /* Game Title - BizQuiz*/
            .game-title {
                font-size: 3.5rem;
                font-weight: 700;
                line-height: 1.1;
                margin-bottom: 0.5rem;
                position: relative;
                z-index: 1;
                background: linear-gradient(180deg, #FFFFFF 30%, var(--accent) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            /* Tag line - Answer, learn, grow */
            .splash-tagline {
                font-size: 14px;
                font-weight: 500;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: var(--text-primary);
                margin-bottom: 0.25rem;
                position: relative;
                z-index: 1;
            }

        </style>
    </head>

    <body>
        <div id="game-container">

            <!-- SCREEN 1: Splash/Start Screen -->
            <div id="splash-screen" class="screen active">
                <p style="color: var(--accent); padding-top: 40vh; text-align: center;">
                    Splash screen goes here (Step 2)
                </p>
            </div>

            <!-- SCREEN 2: Main gameplay -->
            <div id="game-screen" class="screen">
                <p style="color: var(--accent); padding-top: 40vh; text-align: center;">
                    Game screen goes here (Steps 3-6)
                </p>
            </div>

            <!-- SCREEN 3: End / Results -->
            <div id="end-screen" class="screen">
                <p style="color: var(--accent); padding-top: 40vh; text-align: center;">
                    End screen goes here (Step 9)
                </p>
            </div>
        </div>

    </body>
</html>
