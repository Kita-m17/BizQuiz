<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <meta name="theme-color" content="#0A1A0F">
        <title>BizQuiz — M-Pesa</title>

        <style>
            /* Reset CSS - default styles */
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            /* CSS Variables - Colour and Custom Properties */
            :root {
                /* Background layers - darkest to lightest */
                --bg-body: #0A1A0F; /* deepest dark green-black */
                --bg-card: #0F2518; /* slightly lighter - for cards/panels */
                --bg-card-hover: #143020; /* hover state on interactive elements */
                --bg-input: #1A3528; /* input fields, option buttons */
 
                /* M-Pesa brand green - the star of the show */
                --accent: #00C853; /* primary green */
                --accent-dim: #00A844; /* slightly darker green for borders */
                --accent-glow: rgba(0, 200, 83, 0.15); /* subtle green glow effect */
 
                /* Text colors - brightest to dimmest */
                --text-primary: #FFFFFF;
                --text-secondary: #A8C5B0; /* muted green-tinted gray */
                --text-dim: #5A7A62; /* very subtle, for hints */
 
                /* Score feedback */
                --gain: #00E676; /* bright green for correct/gains */
                --loss: #FF5252; /* red for wrong/losses */
 
                /* Borders */
                --border: rgba(0, 200, 83, 0.2); /* subtle green border */
                --border-strong: rgba(0, 200, 83, 0.4); /* more visible border */
 
                /* Sizing */
                --radius: 12px; /* standard corner rounding */
                --radius-sm: 8px; /* smaller corners for buttons */
            }

            /* Body Styles */
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: var(--bg-body);
                color: var(--text-primary);
                min-height: 100dvh;
                overflow-x: hidden;
            }

            /* Game Container */
            #game-container {
                max-width: 430px;
                margin: 0 auto;
                min-height: 100dvh;
                position: relative;
                overflow: hidden;
            }

            /* Screen Management */
            .screen {
                display: none; /* hidden by default */
                flex-direction: column;
                min-height: 100dvh;
                padding: 0 16px;
            }
        
            .screen.active {
                display: flex; /* shown when .active class is added */
            }

            /*splash screen*/

            /* Splash Layout */
            #splash-screen {
                justify-content: center;
                align-items: center;
                text-align: center;
                padding: 2rem 1.5rem;
                position: relative;
            }

            /*Hero Image*/
            .splash-hero-img {
                max-width: 100%;
                height: auto;
                margin-bottom: 2rem;
                position: relative;
                z-index: 1;
            }

            /* start button */
            .splash-start-btn {
                background: linear-gradient(180deg, #00E676 0%, #00A844 100%);
                color: #000;
                font-size: 20px;
                font-weight: 800;
                letter-spacing: 3px;
                text-transform: uppercase;
                padding: 1.1rem 3.5rem;
                border: none;
                border-radius: 50px;
                cursor: pointer;
                position: relative;
                z-index: 1;
                box-shadow:
                    0 4px 20px rgba(0, 200, 83, 0.4),
                    0 0 40px rgba(0, 200, 83, 0.15);
                transition: all 0.2s ease;
                margin-bottom: 3rem;
                width: 85%;
                max-width: 320px;
            }

            .splash-start-btn:hover {
                box-shadow:
                    0 4px 25px rgba(0, 200, 83, 0.6),
                    0 0 50px rgba(0, 200, 83, 0.25);
                transform: scale(1.03);
            }
            
            .splash-start-btn:active {
                transform: scale(0.97);
            }

            /* three circles with labels at the bottom */
            .splash-features {
                display: flex;
                justify-content: center;
                gap: 1.25rem;
                position: relative;
                z-index: 1;
                width: 100%;
            }
        
            .splash-feature {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 6px;
                flex: 1;
                max-width: 110px;
            }
 
            .splash-feature-icon {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background: rgba(0, 200, 83, 0.08);
                border: 1px solid var(--border-strong);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                color: var(--accent);
            }
        
            .splash-feature-title {
                font-size: 11px;
                font-weight: 600;
                color: var(--text-primary);
                text-transform: uppercase;
                letter-spacing: 1px;
            }
        
            .splash-feature-sub {
                font-size: 9px;
                color: var(--text-dim);
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

        </style>
    </head>

    <body>
        <div id="game-container">

            <!-- SCREEN 1: Splash/Start Screen -->
            <div id="splash-screen" class="screen active">
                <p style="color: var(--accent); padding-top: 40vh; text-align: center;">
                    <!-- hero image-->
                    <img 
                        src="images/splash-hero.png" 
                        alt="M-Pesa BizQuiz — Answer. Learn. Grow." 
                        class="splash-hero-img"
                    >
                
                    <button class="splash-start-btn" onclick="startGame()">
                        Start game &nbsp; >
                    </button>

                    <!-- Three feature icons at bottom -->
                    <div class="splash-features">
                        <div class="splash-feature">
                            <div class="splash-feature-icon">🏆</div>
                            <div class="splash-feature-title">Quiz</div>
                            <div class="splash-feature-sub">your knowledge</div>
                        </div>

                        <div class="splash-feature">
                            <div class="splash-feature-icon">📈</div>
                            <div class="splash-feature-title">Earn points</div>
                            <div class="splash-feature-sub">climb the ranks</div>
                        </div>

                        <div class="splash-feature">
                            <div class="splash-feature-icon">📱</div>
                            <div class="splash-feature-title">Powered by</div>
                            <div class="splash-feature-sub">M-Pesa</div>
                        </div>
                    </div>

                </p>
            </div>

            <!-- SCREEN 2: Main gameplay -->
            <div id="game-screen" class="screen">
                <p style="color: var(--accent); padding-top: 40vh; text-align: center;">
                    Game screen goes here (Steps 3-6)
                </p>
            </div>

            <!-- SCREEN 3: End / Results -->
            <div id="end-screen" class="screen">
                <p style="color: var(--accent); padding-top: 40vh; text-align: center;">
                    End screen goes here (Step 9)
                </p>
            </div>
        </div>

    </body>
</html>
